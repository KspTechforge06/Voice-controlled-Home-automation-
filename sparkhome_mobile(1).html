<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SparkHome">
<meta name="theme-color" content="#0f0f13">
<title>SparkHome</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0f0f13;
    --surface: #17171e;
    --border:  #26262f;
    --amber:   #d09000;
    --amber-lt:#fef3d0;
    --amber-dk:#7a5200;
    --green:   #3a9e62;
    --red:     #c94040;
    --text:    #e8e8f0;
    --muted:   #7a7a90;
    --hint:    #4a4a5a;
    --radius:  14px;
    --radius-sm: 8px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  body { padding-bottom: env(safe-area-inset-bottom, 20px); }

  /* Scroll container */
  .page {
    min-height: 100%;
    padding: 16px 16px 32px;
    max-width: 480px;
    margin: 0 auto;
  }

  /* Top bar */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    padding-top: env(safe-area-inset-top, 12px);
  }
  .app-logo {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -.01em;
  }
  .app-logo span { color: var(--amber); }
  .conn-pill {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 5px 11px; border-radius: 99px;
    max-width: 160px; overflow: hidden;
  }
  .conn-pill-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--hint); flex-shrink: 0; }
  .dot.ok  { background: var(--green); }
  .dot.err { background: var(--red); }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 14px;
  }
  .card-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--hint);
    margin-bottom: 14px;
  }

  /* IP input row */
  .ip-row { display: flex; gap: 8px; }
  .ip-row input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 14px;
    padding: 11px 14px;
    border-radius: var(--radius-sm);
    outline: none;
    -webkit-appearance: none;
    transition: border-color .2s;
  }
  .ip-row input::placeholder { color: var(--hint); }
  .ip-row input:focus { border-color: var(--amber); }
  .btn {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 13px;
    font-weight: 500;
    padding: 11px 16px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
    transition: background .15s, transform .1s;
    touch-action: manipulation;
  }
  .btn:active { transform: scale(0.96); background: var(--border); }

  /* Light card */
  .light-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 20px 20px;
    margin-bottom: 14px;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
    transition: border-color .35s;
  }
  .light-card.on { border-color: rgba(208,144,0,.5); }

  /* Bulb button */
  .bulb-btn {
    width: 110px; height: 110px;
    border-radius: 50%;
    background: var(--bg);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    transition: border-color .3s, background .3s;
    position: relative;
  }
  .bulb-btn::after {
    content: '';
    position: absolute; inset: -10px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(208,144,0,.15) 0%, transparent 70%);
    opacity: 0;
    transition: opacity .4s;
    pointer-events: none;
  }
  .bulb-btn.on { border-color: var(--amber); background: rgba(208,144,0,.06); }
  .bulb-btn.on::after { opacity: 1; }
  .bulb-btn:active { transform: scale(0.95); }
  .bulb-btn svg { width: 58px; height: 58px; }

  /* State display */
  .state-display { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .state-name { font-size: 18px; font-weight: 600; }
  .state-sub { font-size: 12px; color: var(--muted); }
  .state-badge {
    font-size: 11px; font-weight: 600; letter-spacing: .05em;
    padding: 3px 10px; border-radius: 99px;
    background: var(--bg); border: 1px solid var(--border); color: var(--muted);
    transition: all .3s;
  }
  .state-badge.on { background: rgba(208,144,0,.12); border-color: var(--amber); color: var(--amber); }

  /* Control buttons */
  .ctrl-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; width: 100%;
  }
  .ctrl-btn {
    padding: 13px 6px; font-size: 13px; font-weight: 500;
    border-radius: var(--radius-sm);
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    transition: all .15s;
    letter-spacing: -.01em;
  }
  .ctrl-btn:active { transform: scale(0.95); }
  .ctrl-btn.c-on  { border-color: rgba(208,144,0,.4); color: var(--amber); }
  .ctrl-btn.c-on:active  { background: rgba(208,144,0,.08); }
  .ctrl-btn.c-off { border-color: rgba(201,64,64,.3); color: var(--red); }
  .ctrl-btn.c-off:active { background: rgba(201,64,64,.08); }
  .ctrl-btn.c-tog { border-color: var(--border); color: var(--text); }

  /* Voice section */
  .mic-center { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .mic-btn {
    width: 80px; height: 80px; border-radius: 50%;
    background: var(--bg);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    transition: border-color .2s, background .2s;
    position: relative;
  }
  .mic-btn:active { transform: scale(0.93); }
  .mic-btn.listening { border-color: var(--red); background: rgba(201,64,64,.06); }
  .mic-btn.listening svg { stroke: var(--red); }
  @keyframes sonar {
    0%   { box-shadow: 0 0 0 0 rgba(201,64,64,.4); }
    70%  { box-shadow: 0 0 0 16px rgba(201,64,64,0); }
    100% { box-shadow: 0 0 0 0 rgba(201,64,64,0); }
  }
  .mic-btn.listening { animation: sonar 1.4s ease-in-out infinite; }
  .mic-btn svg {
    width: 30px; height: 30px;
    stroke: var(--muted); stroke-width: 1.8;
    fill: none; stroke-linecap: round; stroke-linejoin: round;
    transition: stroke .2s;
  }
  .mic-hint { font-size: 12px; color: var(--muted); text-align: center; }

  .transcript {
    width: 100%; padding: 11px 14px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 13px; color: var(--hint); min-height: 42px;
    display: flex; align-items: center;
    transition: color .2s;
  }
  .transcript.heard { color: var(--text); }

  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .chip {
    font-size: 11px; padding: 3px 9px; border-radius: 99px;
    background: var(--bg); border: 1px solid var(--border); color: var(--muted);
  }

  /* Log */
  .log-list { max-height: 80px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
  .log-list::-webkit-scrollbar { width: 3px; }
  .log-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .le { font-size: 11px; display: flex; gap: 8px; }
  .le .lt { color: var(--hint); flex-shrink: 0; font-variant-numeric: tabular-nums; }
  .le .lm { color: var(--muted); }
  .le.ok  .lm { color: var(--green); }
  .le.err .lm { color: var(--red); }
</style>
</head>
<body>
<div class="page">

  <!-- Top bar -->
  <div class="topbar">
    <div class="app-logo">Spark<span>Home</span></div>
    <div class="conn-pill">
      <span class="dot" id="dot"></span>
      <span class="conn-pill-text" id="connTxt">Not connected</span>
    </div>
  </div>

  <!-- IP connect -->
  <div class="card">
    <div class="card-label">ESP8266 connection</div>
    <div class="ip-row">
      <input id="ipIn" type="text" inputmode="decimal" placeholder="192.168.x.x"
        autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false"/>
      <button class="btn" onclick="connectESP()">Connect</button>
    </div>
  </div>

  <!-- Light card -->
  <div class="light-card" id="lightCard">
    <button class="bulb-btn" id="bulbBtn" onclick="toggleLight()">
      <svg viewBox="0 0 58 68" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path id="bBody" d="M29 5C19.6 5 12 12.6 12 22C12 28.8 15.4 34.8 20.5 38.1V47H37.5V38.1C42.6 34.8 46 28.8 46 22C46 12.6 38.4 5 29 5Z"
          stroke="#555" stroke-width="1.6" fill="none"/>
        <line x1="20.5" y1="50" x2="37.5" y2="50" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="22" y1="54" x2="36" y2="54" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
        <path id="bFil" d="M25 47L25 36L29 32L33 36L33 47" stroke="#666" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M22 58Q29 63 36 58" stroke="#555" stroke-width="1.5" stroke-linecap="round" fill="none"/>
        <path id="bShine" d="M16 14C18 10 21.5 7.5 25 6.5" stroke="#666" stroke-width="1.1" stroke-linecap="round" opacity=".5"/>
      </svg>
    </button>

    <div class="state-display">
      <div class="state-name">Living Room Light</div>
      <div class="state-sub">Relay · GPIO D1</div>
      <span class="state-badge" id="stateBadge">OFF</span>
    </div>

    <div class="ctrl-grid">
      <button class="ctrl-btn c-on"  onclick="setLight(true)">Turn ON</button>
      <button class="ctrl-btn c-tog" onclick="toggleLight()">Toggle</button>
      <button class="ctrl-btn c-off" onclick="setLight(false)">Turn OFF</button>
    </div>
  </div>

  <!-- Voice -->
  <div class="card">
    <div class="card-label">Voice command</div>
    <div class="mic-center">
      <button class="mic-btn" id="micBtn" onclick="toggleListen()">
        <svg viewBox="0 0 24 24">
          <rect x="9" y="2" width="6" height="12" rx="3"/>
          <path d="M5 10a7 7 0 0014 0"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="9"  y1="22" x2="15" y2="22"/>
        </svg>
      </button>
      <div class="mic-hint">Tap the mic and speak</div>
    </div>
    <div class="transcript" id="transcript">Tap mic — say "light on" or "turn off"</div>
    <div class="chips" style="margin-top:12px;">
      <span class="chip">light on</span>
      <span class="chip">turn off</span>
      <span class="chip">toggle</span>
      <span class="chip">switch on</span>
      <span class="chip">chalao</span>
      <span class="chip">band karo</span>
    </div>
  </div>

  <!-- Log -->
  <div class="card">
    <div class="card-label">Event log</div>
    <div class="log-list" id="logList"></div>
  </div>

</div>

<script>
  let lightOn=false, espIP='', recog=null, listening=false;

  function ts(){return new Date().toLocaleTimeString('en-IN',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});}

  function log(msg,type='info'){
    const l=document.getElementById('logList');
    const e=document.createElement('div');
    e.className='le '+type;
    e.innerHTML=`<span class="lt">${ts()}</span><span class="lm">${msg}</span>`;
    l.prepend(e);
    while(l.children.length>30)l.lastChild.remove();
  }

  function setConn(s){
    const d=document.getElementById('dot'), t=document.getElementById('connTxt');
    if(s==='ok'){d.className='dot ok'; t.textContent=espIP;}
    else if(s==='err'){d.className='dot err'; t.textContent='Failed';}
    else{d.className='dot'; t.textContent='Not connected';}
  }

  function setUI(state){
    lightOn=state;
    const card=document.getElementById('lightCard');
    const btn=document.getElementById('bulbBtn');
    const body=document.getElementById('bBody');
    const fil=document.getElementById('bFil');
    const shine=document.getElementById('bShine');
    const badge=document.getElementById('stateBadge');
    if(state){
      card.classList.add('on'); btn.classList.add('on');
      body.setAttribute('stroke','#d09000'); body.setAttribute('fill','rgba(208,144,0,.08)');
      fil.setAttribute('stroke','#d09000');
      shine.setAttribute('stroke','#e5a800'); shine.setAttribute('opacity','1');
      badge.textContent='ON'; badge.className='state-badge on';
    }else{
      card.classList.remove('on'); btn.classList.remove('on');
      body.setAttribute('stroke','#555'); body.setAttribute('fill','none');
      fil.setAttribute('stroke','#666');
      shine.setAttribute('stroke','#666'); shine.setAttribute('opacity','.5');
      badge.textContent='OFF'; badge.className='state-badge';
    }
  }

  async function connectESP(){
    espIP=document.getElementById('ipIn').value.trim().replace(/^https?:\/\//,'');
    if(!espIP){log('Enter an IP address','err');return;}
    log('Pinging '+espIP+'...');
    try{
      const r=await fetch(`http://${espIP}/status`,{signal:AbortSignal.timeout(5000)});
      const d=await r.json();
      setConn('ok'); setUI(!!d.light);
      log('Connected — light is '+(d.light?'ON':'OFF'),'ok');
    }catch(e){
      setConn('err');
      log('Could not reach '+espIP,'err');
    }
  }

  async function api(path,opts={}){
    if(!espIP){log('Connect to ESP8266 first','err');return null;}
    try{
      const r=await fetch(`http://${espIP}${path}`,{signal:AbortSignal.timeout(5000),...opts});
      return await r.json();
    }catch(e){log('Request failed — check WiFi','err');return null;}
  }

  async function setLight(s){
    const d=await api('/light',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({state:s})});
    if(d){setUI(d.light);log('Light → '+(d.light?'ON':'OFF'),'ok');}
  }

  async function toggleLight(){
    const d=await api('/toggle');
    if(d){setUI(d.light);log('Toggled → '+(d.light?'ON':'OFF'),'ok');}
  }

  function initSpeech(){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){log('Voice not supported — use Chrome on Android','err');return;}
    recog=new SR();
    recog.continuous=false; recog.interimResults=true; recog.lang='en-IN';
    recog.onresult=e=>{
      let interim='',final='';
      for(let i=e.resultIndex;i<e.results.length;i++){
        if(e.results[i].isFinal)final+=e.results[i][0].transcript;
        else interim+=e.results[i][0].transcript;
      }
      const box=document.getElementById('transcript');
      box.textContent=final||interim||'...'; box.className='transcript heard';
      if(final)processVoice(final.toLowerCase().trim());
    };
    recog.onend=()=>{listening=false;document.getElementById('micBtn').classList.remove('listening');};
    recog.onerror=ev=>{
      listening=false; document.getElementById('micBtn').classList.remove('listening');
      if(ev.error!=='no-speech')log('Voice error: '+ev.error,'err');
    };
  }

  function toggleListen(){
    if(!recog){log('Voice unavailable — use Chrome on Android','err');return;}
    if(listening){
      recog.stop(); listening=false;
      document.getElementById('micBtn').classList.remove('listening');
    }else{
      recog.start(); listening=true;
      document.getElementById('micBtn').classList.add('listening');
      const box=document.getElementById('transcript');
      box.textContent='Listening...'; box.className='transcript';
      log('Listening for command...');
    }
  }

  function processVoice(text){
    log('Heard: "'+text+'"');
    const ON =['light on','turn on','switch on','chalao','on karo','jala','lights on'];
    const OFF=['light off','turn off','switch off','band karo','bujha','lights off'];
    const TOG=['toggle','flip'];
    if(ON.some(p=>text.includes(p)))       {log('Voice → ON','ok'); setLight(true);}
    else if(OFF.some(p=>text.includes(p))) {log('Voice → OFF','ok'); setLight(false);}
    else if(TOG.some(p=>text.includes(p))) {log('Voice → toggle','ok'); toggleLight();}
    else log('Try: "light on" or "turn off"','err');
  }

  initSpeech();
  log('SparkHome ready — connect your ESP8266');
</script>
</body>
</html>
